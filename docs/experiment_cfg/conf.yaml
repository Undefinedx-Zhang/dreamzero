transforms:
  robocasa_gr1_arms_only_fourier_hands:
    _target_: groot.vla.data.transform.ComposedModalityTransform
    transforms:
    - _target_: groot.vla.data.transform.VideoToTensor
      apply_to:
      - video.ego_view_pad_res256_freq20
    - _target_: groot.vla.data.transform.VideoCrop
      apply_to:
      - video.ego_view_pad_res256_freq20
      scale: 0.95
      mode: random
    - _target_: groot.vla.data.transform.VideoResize
      apply_to:
      - video.ego_view_pad_res256_freq20
      height: 176
      width: 320
      interpolation: linear
    - _target_: groot.vla.data.transform.VideoColorJitter
      apply_to:
      - video.ego_view_pad_res256_freq20
      brightness: 0.3
      contrast: 0.4
      saturation: 0.5
      hue: 0.08
    - _target_: groot.vla.data.transform.VideoToNumpy
      apply_to:
      - video.ego_view_pad_res256_freq20
    - _target_: groot.vla.data.transform.StateActionToTensor
      apply_to:
      - state.left_arm
      - state.right_arm
      - state.left_hand
      - state.right_hand
    - _target_: groot.vla.data.transform.StateActionTransform
      apply_to:
      - state.left_arm
      - state.right_arm
      - state.left_hand
      - state.right_hand
      normalization_modes:
        state.left_arm: min_max
        state.right_arm: min_max
        state.left_hand: min_max
        state.right_hand: min_max
    - _target_: groot.vla.data.transform.StateActionToTensor
      apply_to:
      - action.left_arm
      - action.right_arm
      - action.left_hand
      - action.right_hand
    - _target_: groot.vla.data.transform.StateActionTransform
      apply_to:
      - action.left_arm
      - action.right_arm
      - action.left_hand
      - action.right_hand
      normalization_modes:
        action.right_arm: min_max
        action.left_arm: min_max
        action.right_hand: min_max
        action.left_hand: min_max
    - _target_: groot.vla.data.transform.ConcatTransform
      video_concat_order:
      - video.ego_view_pad_res256_freq20
      state_concat_order:
      - state.left_arm
      - state.right_arm
      - state.left_hand
      - state.right_hand
      action_concat_order:
      - action.left_arm
      - action.right_arm
      - action.left_hand
      - action.right_hand
    - _target_: groot.vla.model.dreamzero.transform.dreamzero_cotrain.DreamTransform
