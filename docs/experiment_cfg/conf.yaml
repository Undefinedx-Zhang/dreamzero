model:
  _target_: groot.vla.model.dreamzero.base_vla.VLA
  _convert_: object
  config:
    _target_: groot.vla.model.dreamzero.base_vla.VLAConfig
    _recursive_: false
    model_dtype: float32
    hidden_size: 0
    action_horizon: 24
    action_dim: 32
    backbone_cfg:
      _target_: groot.vla.model.dreamzero.backbone.identity.IdentityBackbone
    action_head_cfg:
      config:
        backbone_features_projector_cfg: null
        _target_: groot.vla.model.dreamzero.action_head.wan_flow_matching_action_tf.WANPolicyHeadConfig
        _recursive_: false
        tiled: false
        tile_size_height: 34
        tile_size_width: 34
        tile_stride_height: 18
        tile_stride_width: 16
        lora_rank: 4
        lora_alpha: 4
        num_frames: 33
        num_frame_per_block: 2
        lora_target_modules: q,k,v,o,ffn.0,ffn.2
        init_lora_weights: kaiming
        train_architecture: full
        use_gradient_checkpointing: true
        add_pos_embed: true
        model_dtype: float32
        max_state_dim: 64
        max_action_dim: 32
        action_loss_embodiment_ids:
        - 26
        - 17
        hidden_size: 64
        input_embedding_dim: 1536
        backbone_embedding_dim: 0
        repa_layer: 8
        repa_coeff: 1.0
        load_pretrained_det_decode_layer_path: /mnt/aws-lfs-02/shared/ckpts/eagle_sim_real_gr1_localization_finetuned_decode_layer.pt
        freeze_decode_layer: false
        expand_batch: null
        use_vlln: true
        vl_self_attention_cfg:
          _target_: groot.vla.model.n1_5.modules.cross_attention_dit.SelfAttentionTransformer
          positional_embeddings: null
          num_layers: 4
          num_attention_heads: 24
          attention_head_dim: 64
          dropout: 0.2
          final_dropout: true
        diffusion_model_cfg:
          _target_: groot.vla.model.dreamzero.modules.wan_video_dit_action_casual_chunk.CausalWanModel
          _convert_: object
          diffusion_model_pretrained_path: /mnt/amlfs-01/home/seonghyeony/ckpts/Wan2.1-I2V-14B-480P
          model_type: i2v
          frame_seqlen: 880
          dim: 5120
          in_dim: 36
          ffn_dim: 13824
          out_dim: 16
          freq_dim: 256
          eps: 1.0e-06
          num_heads: 40
          num_layers: 40
          max_chunk_size: 4
          num_frame_per_block: 2
          num_action_per_block: 24
          num_state_per_block: 1
        text_encoder_cfg:
          _target_: groot.vla.model.dreamzero.modules.wan_video_text_encoder.WanTextEncoder
          _convert_: object
          text_encoder_pretrained_path: /mnt/amlfs-01/home/seonghyeony/ckpts/Wan2.1-I2V-14B-480P/models_t5_umt5-xxl-enc-bf16.pth
        image_encoder_cfg:
          _target_: groot.vla.model.dreamzero.modules.wan_video_image_encoder.WanImageEncoder
          _convert_: object
          image_encoder_pretrained_path: /mnt/amlfs-01/home/seonghyeony/ckpts/Wan2.1-I2V-14B-480P/models_clip_open-clip-xlm-roberta-large-vit-huge-14.pth
        vae_cfg:
          _target_: groot.vla.model.dreamzero.modules.wan_video_vae.WanVideoVAE
          _convert_: object
          vae_pretrained_path: /mnt/amlfs-01/home/seonghyeony/ckpts/Wan2.1-I2V-14B-480P/Wan2.1_VAE.pth
        action_dim: 32
        action_horizon: 24
        num_inference_timesteps: 4
        noise_beta_alpha: 1.5
        noise_beta_beta: 1.0
        noise_s: 0.999
        num_timestep_buckets: 1000
        use_high_noise_emphasis: false
        high_noise_beta_alpha: 3.0
        decouple_video_action_noise: false
        video_noise_beta_alpha: 3.0
        video_noise_beta_beta: 1.0
        decouple_inference_noise: false
        video_inference_final_noise: 0.8
        tune_projector: true
        tune_diffusion_model: true
      _target_: groot.vla.model.dreamzero.action_head.wan_flow_matching_action_tf.WANPolicyHead
      _convert_: object
